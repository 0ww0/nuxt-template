name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, type-check & convention checks
    runs-on: ubuntu-latest

    # Fix 6 — Postgres service for migration drift check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ──────────────────────────────────────────────
      # 1. TypeScript — hard gate, must pass before merge
      # ──────────────────────────────────────────────
      - name: Type check
        run: npx nuxt typecheck
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      # ──────────────────────────────────────────────
      # 1b. Nitro build — catches bundler errors typecheck misses
      #
      #    Fix 5: npx nuxt typecheck validates TypeScript but does not run
      #    the Nitro bundler. A misconfigured hub.db.dialect, broken
      #    auto-import, or invalid plugin will pass typecheck and blow up
      #    on deploy. The build does not need a running Postgres — the dummy
      #    DATABASE_URL satisfies any env validation that fires at build time.
      # ──────────────────────────────────────────────
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NUXT_SESSION_SECRET: ci-build-secret-32-chars-minimum-x

      # ──────────────────────────────────────────────
      # 2. Layer discipline — @nuxthub/db only in repositories/ or tasks/
      #
      #    Fix 2: replaced GNU-only --exclude-path with portable grep -v
      #    pipeline so this works identically on macOS BSD grep and Linux.
      # ──────────────────────────────────────────────
      - name: Check @nuxthub/db import discipline
        run: |
          VIOLATIONS=$(grep -rl "from '@nuxthub/db'" server/ --include="*.ts" 2>/dev/null \
            | grep -v "repositories/" \
            | grep -v "tasks/" \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: @nuxthub/db imported outside server/repositories/ or server/tasks/:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✓ @nuxthub/db imports are confined to repositories and tasks"

      # ──────────────────────────────────────────────
      # 3. Layer discipline — no HTTP primitives in services/
      #
      #    Fix 3: replaced broad `event\.` pattern (which matched variable
      #    names, comments, and non-H3 property accesses) with the specific
      #    Nitro/H3 function names that actually indicate HTTP coupling.
      #    This eliminates false positives without missing real violations.
      # ──────────────────────────────────────────────
      - name: Check services are HTTP-agnostic
        run: |
          VIOLATIONS=$(grep -rn \
            "readBody\|readValidatedBody\|setResponseStatus\|getHeader\|setHeader\|setCookie\|getCookie\|getRequestIP\|defineEventHandler\b" \
            server/services/ \
            --include="*.ts" \
            -l 2>/dev/null || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: HTTP primitives found in server/services/:"
            echo "$VIOLATIONS"
            echo "Services must be HTTP-agnostic — move HTTP logic to the route handler."
            exit 1
          fi
          echo "✓ No HTTP primitives in services"

      # ──────────────────────────────────────────────
      # 4. Webhook signature enforcement
      #
      #    Every handler under server/api/webhooks/ must call
      #    requireWebhookSignature(event) as its first line. The CSRF
      #    middleware exemption is defense-in-depth only; the signature
      #    check is the real gate.
      # ──────────────────────────────────────────────
      - name: Check webhook signature enforcement
        run: |
          FAILED=0
          WEBHOOK_DIR="server/api/webhooks"
          if [ -d "$WEBHOOK_DIR" ]; then
            while IFS= read -r -d '' file; do
              if ! grep -q "requireWebhookSignature" "$file"; then
                echo "ERROR: $file does not call requireWebhookSignature(event)"
                FAILED=1
              fi
            done < <(find "$WEBHOOK_DIR" -name "*.ts" -print0)
          fi
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Every handler under server/api/webhooks/ must call"
            echo "requireWebhookSignature(event) as its first line."
            exit 1
          fi
          echo "✓ All webhook handlers call requireWebhookSignature"

      # ──────────────────────────────────────────────
      # 5. Warning — sensitive handlers that may be missing checkRateLimit
      #    (non-blocking: some thin wrappers are intentionally exempt)
      #
      #    Fix 2: replaced GNU-only --exclude-path with portable grep -v.
      #
      #    Pattern targets only the expensive operations called DIRECTLY in
      #    the handler file (not transitively through a service call):
      #      sendMail           — email sending
      #      mfaService\.send   — OTP email dispatch
      #      mfaService\.verify — OTP verification (brute-force target)
      #
      #    scryptAsync is intentionally NOT in this pattern. Handlers that call
      #    authService.login() or authService.register() use scrypt transitively
      #    through the service layer, but those are guarded by requireUser /
      #    requireMinRole at the handler level. Grepping for scryptAsync in
      #    handler files produces false positives for mfa/enable, mfa/disable,
      #    and users/index.post — all of which are correctly protected.
      #
      #    Exclusions (no checkRateLimit needed — protected by other means):
      #      server/api/dev/ no longer exists — seeding moved to server/tasks/db/seed.ts
      #      server/api/*/mfa/enable.ts   — step-up auth via requireUser; no OTP
      #      server/api/*/mfa/disable.ts  — step-up auth via requireUser; no OTP
      #      server/api/*/users/index.post.ts — requireMinRole('admin') gate
      # ──────────────────────────────────────────────
      - name: Warn on potentially unthrottled sensitive handlers
        run: |
          WARNED=0
          for file in $(grep -rl "sendMail\|mfaService\.send\|mfaService\.verify" \
            server/api/ --include="*.ts" 2>/dev/null \
            | grep -v "mfa/enable" \
            | grep -v "mfa/disable" \
            | grep -v "users/index\.post"); do
            if ! grep -q "checkRateLimit" "$file"; then
              echo "WARNING: $file uses sendMail/mfaService.send/verify but has no checkRateLimit — verify manually"
              WARNED=1
            fi
          done
          if [ "$WARNED" -eq 0 ]; then
            echo "✓ No unthrottled sensitive handlers detected"
          fi
          # Not exit 1 — this is advisory only.

      # ──────────────────────────────────────────────
      # 6. PATCH schemas must use .strict() to block mass-assignment
      #
      #    Fix 4 (part 1): any schema that calls .partial() without .strict()
      #    allows a client to send arbitrary fields including id, role, and
      #    timestamps. This is a hard-fail security gate.
      #
      #    Fix: schema.partial().strict().refine(...)
      # ──────────────────────────────────────────────
      - name: Check PATCH schemas use .strict()
        run: |
          FAILED=0
          for file in $(grep -rl "\.partial()" shared/schemas/ --include="*.ts" 2>/dev/null); do
            if ! grep -q "\.strict()" "$file"; then
              echo "ERROR: $file uses .partial() without .strict() — mass-assignment risk"
              echo "  Fix: schema.partial().strict().refine(...)"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "✓ All PATCH schemas use .strict()"

      # ──────────────────────────────────────────────
      # 7. role must not appear in public create/update schemas
      #
      #    Fix 4 (part 2): role assignment must only happen through dedicated
      #    setRole endpoints with assertCanAssignRole(actor, role). Accepting
      #    role in a public body lets any user escalate their own privileges.
      #
      #    Allowed exceptions:
      #      *setRole*.ts   — dedicated role-mutation endpoint schemas
      #      auth.schema.ts — presentAuthUserV1 response type includes role (read-only)
      #      user.schema.ts — createUserV1Schema is admin-only provisioning (POST /api/v1/users),
      #                       guarded by requireMinRole('admin') + assertCanAssignRole(actor, role).
      #                       The public self-registration schema (registerV1Schema in auth.schema.ts)
      #                       never accepts role. updateUserV1Schema explicitly omits it via .omit().
      # ──────────────────────────────────────────────
      - name: Check role not exposed in public schemas
        run: |
          FAILED=0
          for file in $(grep -rl "\brole\b" shared/schemas/ --include="*.ts" 2>/dev/null \
            | grep -v "setRole" \
            | grep -v "auth.schema" \
            | grep -v "user.schema"); do
            echo "ERROR: $file exposes 'role' — role must not be in public create/update schemas"
            echo "  Role should only appear in dedicated setRoleV1Schema files,"
            echo "  auth.schema.ts (presenter types), or user.schema.ts (admin-only provisioning)."
            FAILED=1
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "✓ No unexpected schema exposes role"

      # ──────────────────────────────────────────────
      # 8. RATE_LIMITS.md staleness check
      #
      #    The gen-rate-limits.mjs script scans every checkRateLimit() call
      #    in server/api/ and rewrites RATE_LIMITS.md. If the committed file
      #    doesn't match, a developer added or changed a rate-limited endpoint
      #    without regenerating the doc.
      #
      #    Fix: run 'node scripts/gen-rate-limits.mjs' locally and commit
      #    the updated RATE_LIMITS.md alongside the handler change.
      # ──────────────────────────────────────────────
      - name: Check RATE_LIMITS.md is up to date
        run: |
          node scripts/gen-rate-limits.mjs
          if ! git diff --exit-code RATE_LIMITS.md; then
            echo ""
            echo "ERROR: RATE_LIMITS.md is stale — checkRateLimit calls changed but the doc wasn't regenerated."
            echo "Fix: run 'node scripts/gen-rate-limits.mjs' locally and commit the updated RATE_LIMITS.md."
            exit 1
          fi
          echo "✓ RATE_LIMITS.md is up to date"

      # ──────────────────────────────────────────────
      # 9. Migration drift — schema changes must have a migration file
      #
      #    Fix 6: a developer who edits a schema file and forgets
      #    `npm run db:generate` will get a broken deploy. This step
      #    re-runs generation and fails if it produces any diff, meaning
      #    there are uncommitted migration files.
      #
      #    Requires the Postgres service defined above.
      # ──────────────────────────────────────────────
      - name: Check migration files are up to date
        run: |
          npm run db:generate
          if ! git diff --exit-code server/db/migrations/; then
            echo ""
            echo "ERROR: Schema changes found without a committed migration file."
            echo "Run 'npm run db:generate' locally and commit the result."
            exit 1
          fi
          echo "✓ Migration files are up to date"
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      # ──────────────────────────────────────────────
      # 10. .env.example drift — hard gate
      #
      #    Issue 7 fix: promoted from advisory (WARN) to a hard gate (ERROR +
      #    exit 1). When a new NUXT_* env var or DATABASE_URL is added to
      #    nuxt.config.ts or a server plugin, .env.example must be updated too.
      #    A developer who copies .env.example on a fresh clone will miss new
      #    required vars and hit runtime errors that look like application bugs.
      #
      #    If a var is optional or provider-specific and should NOT be required
      #    in .env.example, prefix it with a comment in nuxt.config.ts or move
      #    it to a separate optional section in .env.example so the grep
      #    finds it and CI passes.
      # ──────────────────────────────────────────────
      - name: Check .env.example covers referenced env vars
        run: |
          MISSED=0
          for var in $(grep -ohE 'NUXT_[A-Z_]+|DATABASE_URL' \
            nuxt.config.ts server/plugins/*.ts 2>/dev/null | sort -u); do
            if ! grep -q "^${var}" .env.example 2>/dev/null; then
              echo "ERROR: $var is referenced in config/plugins but missing from .env.example"
              MISSED=1
            fi
          done
          if [ "$MISSED" -eq 1 ]; then
            echo ""
            echo "Fix: add the missing var(s) to .env.example with a placeholder value."
            echo "e.g. NUXT_SESSION_SECRET=your-secret-here"
            exit 1
          fi
          echo "✓ .env.example covers all referenced env vars"