name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, type-check & convention checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 1. TypeScript — hard gate
      - name: Type check
        run: npx nuxt typecheck
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      # 1b. Nitro build — catches bundler errors typecheck misses (bad hub.db
      #     dialect, broken auto-import, invalid plugin). Build doesn't need a
      #     live DB — the dummy URL satisfies any build-time env validation.
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      # 2. Convention & security guardrails — SINGLE SOURCE OF TRUTH.
      #    Runs the same script developers run locally (scripts/check-conventions.sh),
      #    which itself delegates the role check to scripts/check-role-schemas.sh.
      #    Keeping these in the script (not inlined here) is what stops CI from
      #    drifting away from the local checks — the exact failure that
      #    re-introduced the broken role gate.
      #
      #    Covers: @nuxthub/db layering · services HTTP-agnostic ·
      #    .partial()⇒.strict() · role only in edge-gated schemas ·
      #    webhook signature · singleton cache-purge key ·
      #    secret columns / presenter spreads · unthrottled-handler warning.
      - name: Convention & security guardrails
        run: bash scripts/check-conventions.sh

      # 3. Rate-limit doc in sync with code — hard gate, no Postgres needed.
      #    `gen-rate-limits.mjs` walks server/api/, finds every checkRateLimit()
      #    call, and regenerates the table inside RATE_LIMITS.md between the
      #    BEGIN/END markers. `git diff --exit-code` then fails if the committed
      #    file doesn't match — catching both:
      #      • a new/changed policy where the doc wasn't updated (wrong numbers)
      #      • a new endpoint that calls checkRateLimit but has no table row
      #    This is strictly better than hand-editing RATE_LIMITS.md: the doc is
      #    always derived from the code, not maintained separately.
      #
      #    The companion "unthrottled handler" warning in check-conventions.sh
      #    catches the DIFFERENT failure: a sensitive endpoint with NO
      #    checkRateLimit call at all. Keep both — they cover different gaps.
      #
      #    One-time setup: run `node scripts/gen-rate-limits.mjs` locally once
      #    and commit the result so the markers exist and the baseline is set.
      - name: Rate-limit doc in sync with code
        run: |
          node scripts/gen-rate-limits.mjs
          if ! git diff --exit-code RATE_LIMITS.md; then
            echo ""
            echo "ERROR: RATE_LIMITS.md is stale — checkRateLimit calls changed but the doc wasn't regenerated."
            echo "Fix: run 'node scripts/gen-rate-limits.mjs' locally and commit the updated RATE_LIMITS.md."
            exit 1
          fi
          echo "✓ RATE_LIMITS.md matches the checkRateLimit calls in code"

      # 4. Migration drift — schema edits must ship a committed migration.
      #    ⚠ VERIFY THE OUTPUT PATH below matches where `npm run db:generate`
      #    actually writes for your NuxtHub setup. Run db:generate locally once
      #    and see which directory changes; if it's not server/db/migrations/,
      #    update the path here or the diff check silently passes (false green).
      - name: Check migration files are up to date
        run: |
          npm run db:generate
          if ! git diff --exit-code server/db/migrations/; then
            echo ""
            echo "ERROR: Schema changes found without a committed migration file."
            echo "Run 'npm run db:generate' locally and commit the result."
            exit 1
          fi
          echo "✓ Migration files are up to date"
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci