# ══════════════════════════════════════════════════════════════════
# DEVELOPMENT Docker Compose — PostgreSQL + Caddy Proxy
# ══════════════════════════════════════════════════════════════════
#
# Runs PostgreSQL and Caddy in Docker. The Nuxt app runs locally
# with `npm run dev` for hot-reload and fast iteration.
# Caddy proxies http://dev.local (port 80) → localhost:3000
# so you can access the app without a visible port number.
#
# Filesystem storage (blob, KV, cache) uses your local .data/
# directory — no Docker needed for those in development.
#
# ── Prerequisites ────────────────────────────────────────────────
#   Add this line to your hosts file (run as Administrator):
#     PowerShell:
#       Add-Content C:\Windows\System32\drivers\etc\hosts "127.0.0.1  dev.local"
#     Or manually edit: C:\Windows\System32\drivers\etc\hosts
#
# ── Quick Start ──────────────────────────────────────────────────
#   docker compose -f docker-compose.dev.yml up -d     # Start PostgreSQL + Caddy
#   npm run dev                                         # Start Nuxt locally
#   Open http://dev.local in your browser               # Access via clean URL
#
# ── Other Commands ───────────────────────────────────────────────
#   docker compose -f docker-compose.dev.yml logs -f         # Follow all logs
#   docker compose -f docker-compose.dev.yml logs -f db      # Follow DB logs
#   docker compose -f docker-compose.dev.yml logs -f caddy   # Follow proxy logs
#   docker compose -f docker-compose.dev.yml ps              # Check status
#   docker compose -f docker-compose.dev.yml down            # Stop services
#   docker compose -f docker-compose.dev.yml down -v         # Stop + delete DB data
#
# ── Access ───────────────────────────────────────────────────────
#   Nuxt App:  http://dev.local       (via Caddy proxy, port 80)
#   Nuxt App:  http://localhost:3000  (direct, via npm run dev)
#   Postgres:  localhost:5432         (user: nuxt, password: nuxt, db: nuxtdb)
#
# ── Environment Variables ────────────────────────────────────────
#   Set DATABASE_URL in your .env file for the local Nuxt dev server:
#   DATABASE_URL=postgresql://nuxt:nuxt@localhost:5432/nuxtdb
#
#   Note: In dev, the host is "localhost" (not "db") because the
#   Nuxt app runs outside Docker and connects to the exposed port.
#
# ── What runs where in dev? ──────────────────────────────────────
#   Caddy proxy  → Docker (this file)   — http://dev.local:80 → localhost:3000
#   PostgreSQL   → Docker (this file)   — localhost:5432
#   Nuxt app     → Local (npm run dev)  — localhost:3000
#   Blob (fs)    → Local .data/blob/    — no Docker needed
#   KV (fs)      → Local .data/kv/      — no Docker needed
#   Cache (fs)   → Local .data/cache/   — no Docker needed
# ══════════════════════════════════════════════════════════════════

services:
  # ──────────────────────────────────────────
  # Caddy Reverse Proxy
  # Image: caddy:2-alpine (~40MB)
  # Proxies http://dev.local (port 80) → host.docker.internal:3000
  # "host.docker.internal" is a special Docker DNS name that
  # resolves to the host machine, allowing Caddy to reach the
  # Nuxt dev server running locally via `npm run dev`.
  # Config file: ./Caddyfile.dev
  # ──────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro  # Dev Caddy config (read-only)
      - caddy_data_dev:/data
      - caddy_config_dev:/config

  # ──────────────────────────────────────────
  # PostgreSQL 16
  # Image: postgres:16-alpine (~240MB)
  # Alpine-based PostgreSQL 16 (current stable LTS).
  # Data is persisted in the pg_data_dev named volume
  # (separate from production to avoid conflicts).
  # ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nuxt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nuxt}
      POSTGRES_DB: ${POSTGRES_DB:-nuxtdb}
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nuxt} -d ${POSTGRES_DB:-nuxtdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pg_data_dev:
    driver: local
  caddy_data_dev:
    driver: local
  caddy_config_dev:
    driver: local
